name: Python CI   # Name of the workflow

# Trigger the workflow on any push to the main branch or pull request
on:                             # Event that triggers the workflow
    push:                       # Trigger on push events
        branches:               # Specify the branches to trigger on
            - main              # Trigger on pushes to the main branch
    pull_request:               # Trigger on pull request events
        branches:               # Specify the branches to trigger on
            - main              # Trigger on pull requests targeting the main branch

jobs:                           # Define the jobs to run in the workflow
    test:                       # Name of the job
        runs-on: ubuntu-latest  # Specify the operating system to run the job on
        steps:                  # Define the steps to run in the job
            # Step 1: Check out the code from the repository
            - name: Checkout code  # Step to check out the code from the repository
              uses: actions/checkout@v2  # Use the checkout action to get the code

            # Step 2: Set up Python environment
            - name: Set up Python  # Step to set up the Python environment
              uses: actions/setup-python@v2  # Use the setup-python action to set up Python
              with:
                python-version: '3.8'   # Specify the Python version to use

            # Step 3: Install dependencies
            - name: Install dependencies  # Step to install the required dependencies
              run: |
                python -m pip install --upgrade pip  # Upgrade pip
                pip install pytest  # Install pytest for running tests
